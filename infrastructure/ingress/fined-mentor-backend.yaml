apiVersion: apps/v1
kind: Deployment
metadata:
  name: fined-mentor-backend
  labels:
    app: fined-mentor-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: fined-mentor-backend
  template:
    metadata:
      labels:
        app: fined-mentor-backend
    spec:
      containers:
      - name: fined-mentor-backend
        image: loicmaxwell/fined-mentor-backend:1.0.0-ff22e2e
        ports:
        - containerPort: 8080
        env:
          - name: MONGO_URI
            valueFrom:
              configMapKeyRef:
                name: fined-mentor-config
                key: MONGO_URI
          - name: JWT_SECRET
            valueFrom:
              secretKeyRef:
                name: fined-mentor-backend-secret
                key: JWT_SECRET
          - name: EMAIL_USERNAME
            valueFrom:
              secretKeyRef:
                name: fined-mentor-backend-secret
                key: EMAIL_USERNAME
          - name: EMAIL_PASSWORD
            valueFrom:
              secretKeyRef:
                name: fined-mentor-backend-secret
                key: EMAIL_PASSWORD
          - name: GOOGLE_GENAI_API_KEY
            valueFrom:
              secretKeyRef:
                name: fined-mentor-backend-secret
                key: GOOGLE_GENAI_API_KEY
          - name: TAVILY_API_KEY
            valueFrom:
              secretKeyRef:
                name: fined-mentor-backend-secret
                key: TAVILY_API_KEY
          - name: REDIS_HOST
            valueFrom:
              configMapKeyRef:
                name: fined-mentor-config
                key: REDIS_HOST
          - name: REDIS_PORT
            valueFrom:
              configMapKeyRef:
                name: fined-mentor-config
                key: REDIS_PORT
        startupProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 0
          periodSeconds: 5
          failureThreshold: 36
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: fined-mentor-backend
  labels:
    app: fined-mentor-backend
    job: fined-mentor-backend-job
spec:
  selector:
    app: fined-mentor-backend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      name: http

  
